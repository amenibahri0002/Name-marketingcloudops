name: CI/CD DigiPip

on:
  push:
    branches: [main]

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend
        working-directory: ./backend
        run: npm ci

      - name: Install frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Render
        run: |
          echo "✅ Render déploie automatiquement sur push main"
          echo "URL: https://marketingcloudops-backend.onrender.com"

      - name: 🏥 Health Check
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://marketingcloudops-backend.onrender.com/api/health)
          echo "Status: $response"
          if [ "$response" = "200" ]; then
            echo "✅ Backend OK"
          else
            echo "⚠️ Status $response - vérifie manuellement"
          fi